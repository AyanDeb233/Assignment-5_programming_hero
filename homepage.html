<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github-Issue-Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind & daisy khala add -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn add  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font style add  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Momo+Trust+Display&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- navbar  -->
    <section>
      <div
        class="navbar px-4 sm:px-6 lg:px-8 py-5 flex flex-col sm:flex-row justify-between shadow-sm gap-3"
      >
        <!-- github icon section  -->
        <div class="section1">
          <div class="flex items-center gap-1">
            <img
              class="w-[36px] h-[37px]"
              src="./assets/github-logo.png"
              alt=""
            />
            <h1 class="text-[16px] font-semibold flex-nowrap">
              GitHub Issues Tracker
            </h1>
          </div>
        </div>

        <div
          class="section2 flex flex-col sm:flex-row justify-center items-center gap-4 md:gap-2"
        >
          <!-- search bar section  -->
          <div>
            <label class="input">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="search" required placeholder="Search issues..." />
            </label>
          </div>
          <!-- new issue btn section  -->
          <button class="btn btn-primary w-full sm:w-auto">
            <i class="fa-solid fa-plus"></i>
            <h1 class="text-[16px]">New Issue</h1>
          </button>
        </div>
      </div>
    </section>

    <!-- toggle section  -->
    <section class="max-w-[70%] mx-auto pt-12">
      <div class="toggle-bar border border-gray-400 p-5 rounded-lg shadow-sm">
        <div class="join flex w-full max-w-md gap-2">
          <input
            class="join-item btn flex-1 text-gray-500 checked:text-white shadow-sm border border-gray-400 rounded-lg"
            type="radio"
            name="options"
            aria-label="All"
            checked
          />
          <input
            class="join-item btn flex-1 text-gray-500 checked:text-white shadow-sm border border-gray-400 rounded-lg"
            type="radio"
            name="options"
            aria-label="Open"
          />
          <input
            class="join-item btn flex-1 text-gray-500 checked:text-white shadow-sm border border-gray-400 rounded-lg"
            type="radio"
            name="options"
            aria-label="Closed"
          />
        </div>
      </div>
    </section>

    
  </body>
</html>
